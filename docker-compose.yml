services:
  postgres:
    image: postgres:16-alpine
    container_name: learn-sql-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-learn_sql}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learn_sql}
      POSTGRES_DB: ${POSTGRES_DB:-learn_sql}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learn_sql} -d ${POSTGRES_DB:-learn_sql}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
