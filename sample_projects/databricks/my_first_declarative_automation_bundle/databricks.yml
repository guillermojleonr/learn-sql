# This is a Databricks asset bundle definition for my_first_declarative_automation_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: my_first_declarative_automation_bundle
  uuid: 112d4fa6-0fc0-4d15-b016-36f947f00ba3

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-f4d6c1e2-d244.cloud.databricks.com
    variables:
      catalog: default_catalog
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-f4d6c1e2-d244.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/guillermojleonr@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/guillermojleonr@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: default_catalog
      schema: prod
    permissions:
      - user_name: guillermojleonr@gmail.com
        level: CAN_MANAGE
